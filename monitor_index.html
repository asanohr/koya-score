<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>兵庫県高校野球連盟スコアモニター</title>
  <style>
    :root {
      --bg:#f0f4f8; --surface:#fff; --surface2:#f5f7fa; --border:#dde3ed;
      --text:#1a1d27; --text-dim:#555; --accent:#1d6fd8;
      --new:#6b7280; --new-bg:rgba(107,114,128,.12);
      --updated:#dc2626; --updated-bg:rgba(220,38,38,.08);
      --win:#16a34a; --lose:#555;
      --status-end:#1d6fd8; --status-play:#92400e; --radius:10px;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;font-size:14px;}

    /* ── ヘッダー ── */
    header{
      background:var(--surface);border-bottom:1px solid var(--border);
      padding:10px 20px;display:flex;align-items:center;justify-content:space-between;
      flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:100;
    }
    header h1{font-size:15px;font-weight:700;color:var(--accent);white-space:nowrap;}
    .header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
    .status-bar{font-size:12px;color:var(--text-dim);}
    .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;}
    .dot.ok{background:var(--win);} .dot.err{background:var(--accent);} .dot.ing{background:var(--updated);animation:blink 1s ease infinite;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
    .gh-status{font-size:11px;color:var(--text-dim);white-space:nowrap;}
    .btn{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:5px 11px;font-size:12px;cursor:pointer;transition:opacity .15s;font-family:inherit;}
    .btn:hover{opacity:.85;} .btn:disabled{opacity:.45;cursor:default;}
    .btn.sub{background:var(--surface2);color:var(--text-dim);border:1px solid var(--border);}
    .btn.sm{padding:3px 8px;font-size:11px;}
    .countdown{font-size:12px;color:var(--text-dim);min-width:90px;}
    .spinner{display:none;width:14px;height:14px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .sep{width:1px;height:20px;background:var(--border);flex-shrink:0;}

    /* ── 設定パネル ── */
    .panel{background:var(--surface);border-bottom:2px solid var(--accent);}
    .panel-inner{max-width:1100px;margin:0 auto;padding:14px 20px;}
    .panel h2{font-size:13px;font-weight:700;color:var(--text-dim);margin-bottom:12px;text-transform:uppercase;letter-spacing:.05em;}
    .cfg-grid{display:flex;flex-wrap:wrap;gap:10px 20px;align-items:center;}
    .cfg-grid label{font-size:12px;color:var(--text-dim);white-space:nowrap;}
    .cfg-grid input{
      background:var(--surface2);color:var(--text);border:1px solid var(--border);
      border-radius:5px;padding:5px 9px;font-size:13px;font-family:inherit;
    }
    .cfg-grid input:focus{outline:2px solid var(--accent);}
    #cfgStatus{font-size:12px;margin-left:8px;}

    /* ── セッションパネル ── */
    .session-panel{background:#eef4ff;border-bottom:1px solid #c7d8f5;}
    .session-inner{max-width:1100px;margin:0 auto;padding:12px 20px;display:flex;flex-wrap:wrap;gap:14px 30px;align-items:flex-end;}
    .ses-field{display:flex;flex-direction:column;gap:4px;}
    .ses-field label{font-size:11px;font-weight:700;color:#3d5a99;text-transform:uppercase;letter-spacing:.04em;}
    .ses-field input{
      background:#fff;color:var(--text);border:1px solid #aabde0;
      border-radius:5px;padding:5px 9px;font-size:13px;font-family:inherit;
    }
    .ses-field input:focus{outline:2px solid var(--accent);}
    .ses-field .row{display:flex;align-items:center;gap:6px;}
    .date-badge{
      display:inline-block;background:var(--accent);color:#fff;
      border-radius:4px;padding:3px 10px;font-size:13px;font-weight:700;white-space:nowrap;
    }
    .field-error{font-size:11px;color:#dc2626;}

    /* ── メイン ── */
    main{max-width:1100px;margin:0 auto;padding:18px 14px 40px;}
    .legend{display:flex;gap:12px;flex-wrap:wrap;}
    .legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-dim);}
    .badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;}
    .badge.new    {background:var(--new-bg);    color:var(--new);     border:1px solid rgba(107,114,128,.3);}
    .badge.updated{background:var(--updated-bg);color:var(--updated); border:1px solid rgba(220,38,38,.4);}
    .badge.playing{background:#fef3c7;color:var(--status-play);border:1px solid rgba(180,83,9,.3);}
    .badge.ended  {background:rgba(29,111,216,.08);color:var(--status-end);border:1px solid rgba(29,111,216,.4);}

    /* ── 2カラムグリッド ── */
    .region-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start;}
    .region-col{display:flex;flex-direction:column;gap:16px;}
    @media(max-width:800px){
      .region-grid{grid-template-columns:1fr;}
      .region-grid .region-col:last-child{margin-top:0;}
    }

    /* ── カード ── */
    .region-section{margin-bottom:0;}
    .region-header{font-size:15px;font-weight:700;color:var(--text-dim);border-left:3px solid var(--accent);padding-left:10px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
    .region-toggle-btn{font-size:11px;color:var(--text-dim);background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:2px 7px;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:inherit;transition:background .15s;}
    .region-toggle-btn:hover{background:var(--border);}
    .game-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;transition:border-color .3s;}
    .game-card.is-new    {border-color:rgba(107,114,128,.5); animation:pulse-new 1.5s ease 3;}
    .game-card.is-updated{border-color:rgba(255,77,77,.5);  animation:pulse-upd 1.5s ease 3;}
    @keyframes pulse-new{0%,100%{box-shadow:0 0 0 0 rgba(107,114,128,0)}  50%{box-shadow:0 0 0 4px rgba(107,114,128,.25)}}
    @keyframes pulse-upd{0%,100%{box-shadow:0 0 0 0 rgba(255,77,77,0)}   50%{box-shadow:0 0 0 4px rgba(255,77,77,.2)}}
    .card-header{padding:8px 14px;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;}
    .card-header:hover{background:rgba(0,0,0,.02);}
    .card-round-wrap{display:flex;align-items:center;gap:6px;flex:1;min-width:0;}
    .card-round{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;}
    .card-time{font-size:11px;color:var(--text-dim);white-space:nowrap;flex-shrink:0;}
    .card-toggle-btn{font-size:12px;color:var(--text-dim);background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:3px 10px;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:inherit;transition:background .15s;}
    .card-toggle-btn:hover{background:var(--border);}
    /* スコア表：常に表示 */
    .card-score{border-top:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;}
    /* 詳細パネル：開くで表示 */
    .card-detail{border-top:1px solid var(--border);}
    .card-detail.collapsed{display:none;}
    /* カスタムカード互換 */
    .card-body.collapsed{display:none;}
    .score-table{width:100%;border-collapse:collapse;}
    .score-table th,.score-table td{text-align:center;padding:4px 3px;border-top:1px solid var(--border);min-width:30px;}
    .score-table th{font-size:11px;color:var(--text-dim);font-weight:600;background:var(--surface2);}
    .score-table td.team-name{text-align:left;padding-left:9px;font-weight:700;font-size:14px;min-width:70px;max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .score-table td.inn{font-size:13px;font-weight:700;color:var(--text-dim);}
    .score-table td.inn.scored{color:var(--text);}
    .score-table td.total{font-size:16px;font-weight:800;border-left:1px solid var(--border);}
    .score-table td.total.win{color:var(--win);} .score-table td.total.lose{color:var(--lose);}
    .game-card.is-new td.scored,.game-card.is-new td.total{color:var(--updated)!important;}
    .game-card.is-updated td.changed{color:var(--updated)!important;}
    .badge.updated{cursor:pointer;}
    .badge.updated:hover{opacity:.8;}
    .commentary-toggle{width:100%;text-align:left;padding:6px 14px;background:none;border:none;border-top:1px solid var(--border);color:var(--text-dim);font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit;}
    .commentary-toggle:hover{background:rgba(0,0,0,.02);}
    .commentary-body{display:none;padding:10px 14px;font-size:12px;color:var(--text-dim);line-height:1.7;border-top:1px solid var(--border);background:var(--surface2);}
    .commentary-body.open{display:block;}

    /* ── 埋め込みパネル ── */
    .embed-btn{display:inline-flex;align-items:center;gap:5px;background:none;border:1px solid var(--border);border-radius:5px;color:var(--text-dim);font-size:11px;font-family:inherit;padding:3px 9px;cursor:pointer;transition:background .15s;white-space:nowrap;flex-shrink:0;}
    .embed-btn:hover{background:var(--surface2);color:var(--text);}
    .embed-panel{display:none;border-top:1px solid var(--border);background:#f8f9fc;padding:10px 14px;}
    .embed-panel.open{display:block;}
    .embed-panel label{font-size:11px;color:var(--text-dim);display:block;margin-bottom:4px;}
    .embed-panel code{display:block;background:#eef1f7;border:1px solid var(--border);border-radius:5px;padding:7px 10px;font-size:11px;word-break:break-all;color:var(--text);line-height:1.6;}
    .embed-copy-btn{margin-top:6px;background:var(--accent);color:#fff;border:none;border-radius:5px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:inherit;transition:opacity .15s;}
    .embed-copy-btn:hover{opacity:.85;} .embed-copy-btn.copied{background:var(--win);}

    /* ── メタ情報入力パネル ── */
    .meta-panel{background:#f0f5ff;border-top:1px solid var(--border);padding:10px 14px;}
    .meta-panel .meta-title{font-size:11px;font-weight:700;color:#3d5a99;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;}
    .meta-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
    .meta-row label{font-size:12px;color:var(--text-dim);white-space:nowrap;min-width:130px;}
    .meta-row input{flex:1;background:#fff;color:var(--text);border:1px solid #aabde0;border-radius:5px;padding:5px 9px;font-size:13px;font-family:inherit;}
    .meta-row input:focus{outline:2px solid var(--accent);outline-offset:0;}
    .meta-actions{display:flex;align-items:center;gap:10px;margin-top:4px;}
    .meta-save-btn{background:var(--accent);color:#fff;border:none;border-radius:5px;padding:5px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s;}
    .meta-save-btn:hover{opacity:.85;} .meta-save-btn:disabled{opacity:.45;cursor:default;}
    .meta-preview{font-size:11px;color:var(--text-dim);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

    /* ── カスタムスコアセクション ── */
    .custom-section{max-width:1100px;margin:0 auto;padding:0 14px 48px;}
    .custom-section-title{font-size:15px;font-weight:700;color:var(--text);border-left:3px solid #d97757;padding-left:10px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
    .custom-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;}
    .custom-card-hdr{padding:10px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
    .custom-card-title{font-size:14px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .custom-card-score{font-size:13px;color:var(--text-dim);white-space:nowrap;}
    .custom-card-body{border-top:1px solid var(--border);padding:10px 14px;background:var(--surface2);}
    .custom-card-body label{font-size:11px;color:var(--text-dim);display:block;margin-bottom:4px;}
    .custom-card-body code{display:block;background:#eef1f7;border:1px solid var(--border);border-radius:5px;padding:7px 10px;font-size:11px;word-break:break-all;color:var(--text);line-height:1.6;margin-bottom:6px;}
    .btn.danger{background:#dc2626;color:#fff;}

    .no-games{text-align:center;padding:60px 20px;color:var(--text-dim);font-size:15px;line-height:2;}
    @media(max-width:600px){
      .score-table th,.score-table td{padding:5px 2px;min-width:20px;font-size:13px;}
      .score-table td.team-name{min-width:90px;font-size:14px;}
      .score-table td.total{font-size:16px;}
    }
  </style>
</head>
<body>

<header>
  <h1>⚾ 兵庫県高校野球連盟スコアモニター</h1>
  <div class="header-right">
    <div class="status-bar"><span class="dot" id="statusDot"></span><span id="statusText">読み込み中...</span></div>
    <span class="gh-status" id="ghStatus"></span>
    <div class="countdown" id="countdown"></div>
    <label style="font-size:12px;color:var(--text-dim);display:flex;align-items:center;gap:6px;">
      間隔
      <select id="intervalSelect" onchange="setInterval_(this.value)"
        style="background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:3px 6px;font-size:12px;cursor:pointer;">
        <option value="0">更新なし</option>
        <option value="1">1分</option><option value="2">2分</option><option value="3">3分</option>
        <option value="4">4分</option><option value="5" selected>5分</option><option value="6">6分</option>
        <option value="7">7分</option><option value="8">8分</option><option value="9">9分</option>
        <option value="10">10分</option>
      </select>
    </label>
    <button class="btn" id="refreshBtn" onclick="manualCrawl()">
      <span class="spinner" id="spinner"></span> 今すぐ更新
    </button>
    <button class="btn sub" onclick="location.href='score_creator.html'">✏️ スコア作成</button>
    <div class="sep"></div>
    <button class="btn sub" onclick="toggleAll(true)">全スコアを開く</button>
    <button class="btn sub" onclick="toggleAll(false)">全スコアを閉じる</button>
    <button class="btn sub" onclick="openHistory()">📋 過去のスコア一覧</button>
    <button class="btn sub" onclick="toggleSettings()">⚙️ 設定</button>
  </div>
</header>

<!-- GitHub 設定パネル -->
<div class="panel" id="settingsPanel" style="display:none;">
  <div class="panel-inner">
    <h2>GitHub 接続設定</h2>
    <div class="cfg-grid">
      <label>Personal Access Token</label>
      <input type="password" id="cfgToken" placeholder="ghp_xxxxxxxxxxxx" style="width:260px;">
      <label>Owner</label>
      <input id="cfgOwner" placeholder="asanohr" style="width:130px;">
      <label>Repository</label>
      <input id="cfgRepo" placeholder="koya-score" style="width:150px;">
      <label>Branch</label>
      <input id="cfgBranch" placeholder="main" style="width:90px;">
      <button class="btn sm" onclick="saveGitHubConfig()">💾 保存</button>
      <button class="btn sm sub" onclick="testGitHub()">🔌 テスト接続</button>
      <span id="cfgStatus" style="font-size:12px;"></span>
    </div>
  </div>
</div>

<!-- 試合セッションパネル -->
<div class="session-panel">
  <div class="session-inner">
    <div class="ses-field">
      <label>大会名</label>
      <div class="row">
        <input id="sesName" placeholder="2026年春季大会" style="width:200px;" oninput="saveSession()">
      </div>
    </div>
    <div class="ses-field">
      <label>大会ID（URL用）</label>
      <div class="row">
        <input id="sesId" placeholder="2026spring" style="width:130px;" oninput="validateTournamentId(); saveSession()">
        <span id="sesIdErr" class="field-error"></span>
      </div>
    </div>
    <div class="ses-field">
      <label>試合日</label>
      <div class="row">
        <input type="date" id="sesDate" onchange="updateDateLabel(); saveSession()">
        <span class="date-badge" id="sesDateLabel" style="display:none;"></span>
      </div>
    </div>
    <div class="legend" style="margin-left:auto;margin-bottom:0;align-self:center;">
      <div class="legend-item"><span class="badge new">NEW</span> 新たな試合</div>
      <div class="legend-item"><span class="badge playing">試合中</span> プレー中</div>
      <div class="legend-item"><span class="badge updated">更新</span> 赤字を追加</div>
      <div class="legend-item"><span class="badge ended">終了</span> 試合終了</div>
    </div>
  </div>
</div>

<main id="mainContent">
  <div id="content"></div>
</main>

<!-- カスタムスコアセクション -->
<div class="custom-section">
  <div class="custom-section-title">
    <span>📝 カスタムスコア</span>
    <div style="display:flex;gap:8px;">
      <button class="btn sub sm" onclick="loadAndRenderManualScores()">🔄 更新</button>
      <button class="btn sub sm" onclick="location.href='score_creator.html'">＋ 新規作成</button>
    </div>
  </div>
  <div id="custom-scores-content">
    <div style="color:var(--text-dim);font-size:13px;padding:10px 0;">読み込み中...</div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
//  定数
// ═══════════════════════════════════════════════════
const BASE_URL    = 'http://www.hyogo-koyaren.or.jp';
const INDEX_URL   = BASE_URL + '/taikai/result.php';
const CONFIG_KEY    = 'koya_config';
const SESSION_KEY   = 'koya_session';
const CURRENT_KEY   = 'koya_current';
const CONFIRMED_KEY = 'koya_confirmed'; // このPCの確認済みスナップショット（PC固有）
const GAME_META_KEY = 'koya_game_meta'; // 試合ごとの大会名・その他情報（PC固有）
const MANUAL_IDS_KEY  = 'koya_manual_ids';  // 手動作成スコアID一覧
const DELETED_IDS_KEY   = 'koya_deleted_ids';   // score_history で削除されたゲームIDブラックリスト
const COLLAPSED_RGNS_KEY = 'koya_collapsed_rgns'; // 閉じた会場名リスト
const HIDDEN_REGIONS = []; // 全地区を表示（非表示にしたい地区があればここに追加）
const PROXY_LIST = [
  u => 'https://corsproxy.io/?' + encodeURIComponent(u),
  u => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u),
  u => 'https://thingproxy.freeboard.io/fetch/' + u,
  u => 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(u),
];

// ═══════════════════════════════════════════════════
//  状態
// ═══════════════════════════════════════════════════
let intervalMinutes = 5;
let nextCrawlAt = null, crawlTimer = null, countdownTimer = null, isCrawling = false;
let reloadTimer = null, nextRefreshAt = null;
const openCards = new Set();
let workingProxyIdx = 0;

// ═══════════════════════════════════════════════════
//  localStorage ユーティリティ
// ═══════════════════════════════════════════════════
function loadConfig() {
  try { return JSON.parse(localStorage.getItem(CONFIG_KEY)) || {}; } catch { return {}; }
}
function saveConfig(c) { localStorage.setItem(CONFIG_KEY, JSON.stringify(c)); }

function loadSession() {
  try { return JSON.parse(localStorage.getItem(SESSION_KEY)) || {}; } catch { return {}; }
}
function saveSession() {
  const s = {
    tournament_name: document.getElementById('sesName').value.trim(),
    tournament_id:   document.getElementById('sesId').value.trim(),
    game_date:       document.getElementById('sesDate').value,
    game_date_label: document.getElementById('sesDateLabel').textContent,
  };
  localStorage.setItem(SESSION_KEY, JSON.stringify(s));
}

function loadCurrentData() {
  try { return JSON.parse(localStorage.getItem(CURRENT_KEY)) || defaultData(); } catch { return defaultData(); }
}
function defaultData() {
  return { games: [], last_updated: null, crawl_status: 'pending', error: null, game_count: 0 };
}
function saveCurrentData(d) { localStorage.setItem(CURRENT_KEY, JSON.stringify(d)); }

// ── PC固有の確認状態（GitHubには書き込まない） ──
function loadConfirmed() {
  try { return JSON.parse(localStorage.getItem(CONFIRMED_KEY) || '{}'); } catch { return {}; }
}
function saveConfirmed(c) { localStorage.setItem(CONFIRMED_KEY, JSON.stringify(c)); }

// 試合ごとのメタ情報（大会名・その他情報）
function loadGameMeta() {
  try { return JSON.parse(localStorage.getItem(GAME_META_KEY) || '{}'); } catch { return {}; }
}
function saveGameMeta(m) { localStorage.setItem(GAME_META_KEY, JSON.stringify(m)); }

// 手動作成スコアID一覧
function loadManualIds() {
  try { return JSON.parse(localStorage.getItem(MANUAL_IDS_KEY) || '[]'); } catch { return []; }
}
function saveManualIds(ids) { localStorage.setItem(MANUAL_IDS_KEY, JSON.stringify(ids)); }

// ゲームがこのPCで未確認の更新があるか判定
// confirmed[g.id] が未登録 → 初回表示なので自動確認（赤字なし）
// confirmed[g.id] と現在スコアが異なる → 赤字
function localUpdateInfo(g, confirmed) {
  const snap = confirmed[g.id];
  if (snap === undefined) return { updated: false, prevSnap: null };
  const cur = scoreSnapshot(g);
  if (cur === snap) return { updated: false, prevSnap: null };
  return { updated: true, prevSnap: JSON.parse(snap) };
}

// ═══════════════════════════════════════════════════
//  GitHub API
// ═══════════════════════════════════════════════════
async function ghRequest(method, path, body) {
  const cfg = loadConfig();
  if (!cfg.gh_token) throw new Error('GitHubトークンが未設定です（⚙️設定）');
  if (!cfg.gh_owner || !cfg.gh_repo) throw new Error('Owner/Repoが未設定です（⚙️設定）');
  const url = `https://api.github.com/repos/${cfg.gh_owner}/${cfg.gh_repo}/contents/${path}`;
  const opts = {
    method,
    headers: {
      'Authorization': 'token ' + cfg.gh_token,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json',
    },
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);
  if (res.status === 404) return null;
  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    throw new Error('GitHub API (' + res.status + '): ' + (e.message || '不明'));
  }
  return res.status === 204 ? null : await res.json();
}
async function ghRead(path) { return await ghRequest('GET', path); }

function ghEncode(str) {
  const bytes = new TextEncoder().encode(str);
  let bin = ''; bytes.forEach(b => bin += String.fromCharCode(b));
  return btoa(bin);
}
function ghDecode(b64) {
  const bin = atob(b64.replace(/\n/g, ''));
  return new TextDecoder('utf-8').decode(Uint8Array.from(bin, c => c.charCodeAt(0)));
}

async function ghWrite(path, content, msg) {
  const existing = await ghRead(path);
  const body = {
    message: msg || 'データ更新',
    content: ghEncode(JSON.stringify(content, null, 2)),
    branch:  loadConfig().gh_branch || 'main',
  };
  if (existing?.sha) body.sha = existing.sha;
  try {
    return await ghRequest('PUT', path, body);
  } catch(e) {
    // 409: SHA競合（他のタブ/デバイスが先に書き込んだ）→ SHA再取得してリトライ
    if (e.message.includes('409')) {
      const fresh = await ghRead(path);
      if (fresh?.sha) body.sha = fresh.sha;
      return await ghRequest('PUT', path, body);
    }
    throw e;
  }
}

async function updateTournamentIndex(session, gameCount, lastUpdated) {
  const path = 'data/index.json';
  let index = { tournaments: [] };
  const existing = await ghRead(path);
  if (existing?.content) {
    try { index = JSON.parse(ghDecode(existing.content)); } catch(e) {}
  }
  const entry = {
    id:           session.tournament_id,
    name:         session.tournament_name || session.tournament_id,
    date:         session.game_date || '',
    game_count:   gameCount,
    last_updated: lastUpdated,
  };
  const idx = index.tournaments.findIndex(t => t.id === session.tournament_id);
  if (idx >= 0) index.tournaments[idx] = entry; else index.tournaments.push(entry);
  index.tournaments.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  index.last_updated = lastUpdated;
  await ghWrite(path, index, '大会一覧更新');
}

// ═══════════════════════════════════════════════════
//  スクレイピング
// ═══════════════════════════════════════════════════
async function fetchRaw(url) {
  // プロキシ側キャッシュを回避するためソースURLにタイムスタンプを付加
  const bustUrl = url + (url.includes('?') ? '&' : '?') + '_=' + Date.now();
  const order = [workingProxyIdx, ...PROXY_LIST.map((_,i)=>i).filter(i=>i!==workingProxyIdx)];
  const errors = [];
  for (const i of order) {
    try {
      // ブラウザキャッシュも無効化
      const res = await fetch(PROXY_LIST[i](bustUrl), { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      workingProxyIdx = i;
      return await res.arrayBuffer();
    } catch(e) { errors.push('proxy' + i + ': ' + e.message); }
  }
  throw new Error('全プロキシ失敗 (' + errors.join(' / ') + ')');
}
async function fetchHtml(url) {
  const buf  = await fetchRaw(url);
  const utf8 = new TextDecoder('utf-8').decode(buf);
  const m    = utf8.match(/charset=["\s]*([\w-]+)/i);
  const cs   = m ? m[1].toLowerCase() : '';
  if (cs === 'utf-8' || cs === 'utf8') return utf8;
  for (const enc of ['euc-jp', 'shift-jis']) {
    try { return new TextDecoder(enc).decode(buf); } catch(e) {}
  }
  return utf8;
}
function makeId(region, round, url) {
  const s = region + '|' + round + '|' + url;
  let h = 0;
  for (let i = 0; i < s.length; i++) h = Math.imul(31, h) + s.charCodeAt(i) | 0;
  return (h >>> 0).toString(16).padStart(8, '0');
}
async function fetchGameLinks() {
  const html = await fetchHtml(INDEX_URL);
  const doc  = new DOMParser().parseFromString(html, 'text/html');
  const results = [];
  doc.querySelectorAll('dl').forEach(dl => {
    const region = dl.querySelector('dt')?.textContent.trim() || '不明';
    dl.querySelectorAll('dd a[href]').forEach(a => {
      let href = a.getAttribute('href') || '';
      const round = a.textContent.trim();
      if (!href || !round) return;
      if (href.startsWith('../'))        href = BASE_URL + '/' + href.slice(3);
      else if (href.startsWith('/'))     href = BASE_URL + href;
      else if (!href.startsWith('http')) href = BASE_URL + '/baseball/' + href;
      results.push({ region, round, url: href });
    });
  });
  return results;
}

function parseScorePage(html, region, round, url) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  let venue = '';
  for (const span of doc.querySelectorAll('span.px16')) {
    const t = span.textContent.trim();
    if (t.includes('会場')) { venue = t.replace(/試合会場[：:]/,'').trim(); break; }
  }
  const allTables = [...doc.querySelectorAll('table')];
  if (!allTables.length) return null;
  let scoreTable = null, scoreRows = [];
  for (const tbl of allTables) {
    const rows = [...tbl.querySelectorAll('tr[bgcolor="#000000"]')]
      .filter(r => r.querySelectorAll('td,th').length >= 10);
    if (rows.length >= 2) { scoreTable = tbl; scoreRows = rows.slice(0, 2); break; }
  }
  if (!scoreRows.length) return null;
  const c1 = [...scoreRows[0].querySelectorAll('td,th')];
  const c2 = [...scoreRows[1].querySelectorAll('td,th')];
  let team1 = (c1[0]?.textContent.trim() || '').replace(/ /g, '');
  let team2 = (c2[0]?.textContent.trim() || '').replace(/ /g, '');
  const nCols = Math.min(c1.length, c2.length);
  const innings1 = [], innings2 = [];
  for (let i = 1; i < nCols - 1; i++) {
    innings1.push(c1[i]?.textContent.trim() || '');
    innings2.push(c2[i]?.textContent.trim() || '');
  }
  const total1 = c1[nCols-1]?.textContent.trim() || '';
  const total2 = c2[nCols-1]?.textContent.trim() || '';
  const teamTable = allTables.find(t => t !== scoreTable && t.classList.contains('left'))
                 || allTables.find(t => t !== scoreTable);
  if ((!team1 || !team2) && teamTable) {
    const tc = [...(teamTable.querySelector('tr[bgcolor="#000000"]')?.querySelectorAll('td,th') || [])];
    if (!team1 && tc[0]) team1 = tc[0].textContent.trim().replace(/ /g, '');
    if (!team2 && tc[3]) team2 = tc[3].textContent.trim().replace(/ /g, '');
  }
  let commentary = '', gameStatus = '';
  for (const tbl of allTables) {
    if (tbl === scoreTable || tbl === teamTable) continue;
    const hasImg = [...tbl.querySelectorAll('img[src]')]
      .some(img => { const s = img.getAttribute('src') || ''; return s.includes('no_21') || s.includes('no_22'); });
    if (!hasImg) continue;
    const tc = [...(tbl.querySelector('tr[bgcolor="#000000"]')?.querySelectorAll('td,th') || [])];
    if (tc.length >= 2) { commentary = tc[0].textContent.trim(); gameStatus = tc[1].textContent.trim(); }
    else if (tc.length === 1) { gameStatus = tc[0].textContent.trim(); }
    break;
  }
  const allEmpty = !team1 && !team2
    && [...innings1,...innings2].every(s => s===''||s==='0')
    && (total1===''||total1==='0') && (total2===''||total2==='0');
  if (allEmpty) return null;
  return {
    id: makeId(region, round, url), region, round, venue,
    game_status: gameStatus, commentary,
    team1, team2, innings1, innings2, total1, total2, url,
    is_new: false, is_updated: false, last_changed: null,
  };
}
function scoreSnapshot(g) {
  return JSON.stringify({ innings1:g.innings1, innings2:g.innings2, total1:g.total1, total2:g.total2, team1:g.team1, team2:g.team2 });
}

// ═══════════════════════════════════════════════════
//  Fetch & Update（クロール→GitHub書き込み）
// ═══════════════════════════════════════════════════
async function fetchAndUpdate() {
  const now     = new Date().toISOString().slice(0, 19);
  const session = loadSession();
  const tournamentId = session.tournament_id;

  if (!tournamentId || !validateTournamentId()) {
    saveCurrentData({ ...loadCurrentData(), crawl_status:'error', error:'大会IDを設定してください（セッション欄）', last_updated:now });
    return;
  }

  let links;
  try { links = await fetchGameLinks(); }
  catch(e) {
    saveCurrentData({ ...loadCurrentData(), crawl_status:'error', error:String(e), last_updated:now });
    return;
  }

  const newGames = [];
  for (const link of links) {
    try {
      const game = parseScorePage(await fetchHtml(link.url), link.region, link.round, link.url);
      if (game) {
        game.game_date       = session.game_date       || '';
        game.game_date_label = session.game_date_label || '';
        newGames.push(game);
      }
    } catch(e) { console.warn('取得失敗:', link.url, e); }
  }

  const oldById = Object.fromEntries((loadCurrentData().games || []).map(g => [g.id, g]));
  const merged  = newGames.map(ng => {
    const old  = oldById[ng.id];
    const snap = scoreSnapshot(ng);
    if (!old) return { ...ng, is_new:true, is_updated:false, confirmed_snapshot:null, last_changed:now };
    const confirmedSnap = old.confirmed_snapshot ?? null;
    let result;
    if (snap !== scoreSnapshot(old)) {
      result = { ...ng, is_new:false, is_updated:true, last_changed:now };
    } else {
      result = { ...ng, is_new:old.is_new||false, is_updated:old.is_updated||false, last_changed:old.last_changed||null };
    }
    result.confirmed_snapshot = confirmedSnap;
    if (confirmedSnap !== null && snap === confirmedSnap) { result.is_new=false; result.is_updated=false; }
    return result;
  });

  // ブラックリストに登録済みのゲームは復活させない
  const _deletedIds = new Set(JSON.parse(localStorage.getItem(DELETED_IDS_KEY) || '[]'));
  const filteredMerged = merged.filter(g => !_deletedIds.has(g.id));

  autoConfirmNew(filteredMerged); // 初回出現ゲームをこのPCで自動確認
  saveCurrentData({ games:filteredMerged, last_updated:now, crawl_status:'ok', error:null, game_count:filteredMerged.length });

  // GitHub に書き込み
  const cfg = loadConfig();
  if (!cfg.gh_token || !cfg.gh_owner || !cfg.gh_repo) {
    setGhStatus('error', '⚠️ GitHub未設定（⚙️設定）');
    return;
  }
  setGhStatus('pending', '📤 GitHub書き込み中...');
  try {
    const data = {
      tournament_id:   tournamentId,
      tournament_name: session.tournament_name || '',
      game_date:       session.game_date       || '',
      games:           enrichGamesWithMeta(filteredMerged, session), // メタ情報（大会名・その他情報）を付加
      last_updated:    now,
    };
    await ghWrite('data/' + tournamentId + '.json', data, '試合結果更新 ' + now);
    await updateTournamentIndex(session, merged.length, now);
    setGhStatus('ok', '✅ ' + new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'}) + ' 書き込み完了');
  } catch(e) {
    setGhStatus('error', '❌ ' + e.message);
    console.error('GitHub write error:', e);
  }
}

function setInterval_(val) {
  intervalMinutes = parseInt(val);
  const cfg = loadConfig(); cfg.interval_minutes = intervalMinutes; saveConfig(cfg);
  if (intervalMinutes === 0) {
    if (crawlTimer) { clearInterval(crawlTimer); crawlTimer = null; }
    startReloadScheduler();
  } else {
    if (reloadTimer) { clearInterval(reloadTimer); reloadTimer = null; nextRefreshAt = null; }
    nextCrawlAt = Date.now() + intervalMinutes * 60 * 1000;
    startScheduler();
  }
}
function startCountdown() {
  if (countdownTimer) clearInterval(countdownTimer);
  countdownTimer = setInterval(() => {
    if (intervalMinutes === 0) {
      if (!nextRefreshAt) return;
      const s = Math.max(0, Math.ceil((nextRefreshAt - Date.now()) / 1000));
      document.getElementById('countdown').textContent = '次の表示更新まで ' + s + '秒';
    } else {
      if (!nextCrawlAt) return;
      const s = Math.max(0, Math.ceil((nextCrawlAt - Date.now()) / 1000));
      const m = Math.floor(s / 60), sec = s % 60;
      document.getElementById('countdown').textContent =
        '次のクロールまで ' + (m > 0 ? m + '分' : '') + sec + '秒';
    }
  }, 1000);
}

function esc(s) {
  return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmt(iso) {
  if (!iso) return '';
  // toISOString() で保存した文字列は UTC だが末尾の Z が省略されている場合があるため補完
  const s = (iso.endsWith('Z') || iso.includes('+')) ? iso : iso + 'Z';
  return new Date(s).toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
function pad(arr, n) { const a = [...arr]; while (a.length < n) a.push(''); return a; }
function effectiveInnCount(inn1, inn2) {
  let max = 9;
  const len = Math.max((inn1||[]).length, (inn2||[]).length);
  for (let i = 9; i < len; i++) {
    const v1 = (inn1||[])[i] != null ? String((inn1||[])[i]) : '';
    const v2 = (inn2||[])[i] != null ? String((inn2||[])[i]) : '';
    if (v1 !== '' || v2 !== '') max = i + 1;
  }
  return max;
}
function winLose(t1, t2) {
  const a = parseInt(t1), b = parseInt(t2);
  if (isNaN(a)||isNaN(b)) return [null,null];
  return a>b ? [true,false] : a<b ? [false,true] : [null,null];
}
function statusBadge(g, confirmed) {
  const s    = g.game_status || '';
  const isEnd = s.includes('終了');
  const inn1  = g.innings1 || [];
  // 試合中：1回表に数値が入った時点
  const isPlaying = !isEnd && inn1[0] !== '' && inn1[0] != null;
  // NEW：チーム名はあるがまだ1回表が未記録
  const isNew = !isEnd && !isPlaying && !!(g.team1 || g.team2);
  const { updated } = localUpdateInfo(g, confirmed); // このPCの確認状態で判定

  if (updated)   return '<span class="badge updated" onclick="confirmGame(event,\''+esc(g.id)+'\')" title="クリックで確認（赤字を消す）">更新 ✓</span>';
  if (isEnd)     return '<span class="badge ended">終了</span>';
  if (isPlaying) return '<span class="badge playing">試合中</span>';
  if (isNew)     return '<span class="badge new">NEW</span>';
  return '';
}

function buildCard(g) {
  const confirmed = loadConfirmed();
  const { updated: isUpdatedLocal, prevSnap } = localUpdateInfo(g, confirmed);
  const innCount = effectiveInnCount(g.innings1, g.innings2);
  const inn1 = pad(g.innings1||[], innCount).slice(0, innCount);
  const inn2 = pad(g.innings2||[], innCount).slice(0, innCount);
  const [w1, w2] = winLose(g.total1, g.total2);
  const cardCls  = isUpdatedLocal ? 'is-updated' : '';
  const isOpen   = openCards.has(g.id);
  const btnLabel = isOpen ? 'スコアのみ ▲' : '詳細 ▼';
  const changedAt = '';

  let th = '<th class="team-name">チーム</th>';
  for (let i = 1; i <= inn1.length; i++) th += '<th>' + i + '</th>';
  th += '<th>計</th>';

  const snap = (isUpdatedLocal && prevSnap) ? prevSnap : null;
  const row  = (name, inns, total, win, snapInns, snapTotal) => {
    let r = '<tr><td class="team-name">' + (esc(name)||'(未定)') + '</td>';
    inns.forEach((s, i) => {
      const ok = s !== '' && s != null;
      const changed = isUpdatedLocal ? (snap ? s !== (snapInns?.[i]??'') : ok) : false;
      r += '<td class="inn'+(ok?' scored':'')+(changed?' changed':'')+'">'+( ok?esc(s):'−')+'</td>';
    });
    const wc = win===true?'win':win===false?'lose':'';
    const tc = isUpdatedLocal ? (snap ? total!==snapTotal : !!total) : false;
    r += '<td class="total '+wc+(tc?' changed':'')+'">'+( esc(total)||'−')+'</td></tr>';
    return r;
  };

  const comm     = g.commentary || '';
  const commHtml = comm
    ? '<button class="commentary-toggle" onclick="toggleComm(this)">📋 試合経過を表示</button>'
      +'<div class="commentary-body">'+esc(comm)+'</div>'
    : '';

  return '<div class="game-card '+cardCls+'" data-id="'+esc(g.id)+'">'
    +'<div class="card-header" onclick="toggleCard(this)">'
    +'<span class="card-round-wrap">'
    +'<span class="card-round">'+esc(g.round)+'</span>'
    +statusBadge(g, confirmed)
    +'</span>'
    +changedAt
    +'<button class="card-toggle-btn">'+btnLabel+'</button>'
    +'</div>'
    +'<div class="card-score">'
    +'<table class="score-table"><thead><tr>'+th+'</tr></thead><tbody>'
    +row(g.team1,inn1,g.total1,w1,snap?.innings1,snap?.total1)
    +row(g.team2,inn2,g.total2,w2,snap?.innings2,snap?.total2)
    +'</tbody></table>'
    +'</div>'
    +'<div class="card-detail '+(isOpen?'':'collapsed')+'">'
    +commHtml
    +buildMetaPanel(g)
    +buildNotePanel(g)
    +buildEmbedPanel(g)
    +'</div></div>';
}

async function saveNote(gameId) {
  const ta = document.getElementById('note-ta-' + gameId);
  if (!ta) return;
  const note = ta.value.trim();

  // localStorage 保存
  const meta = loadGameMeta();
  if (!meta[gameId]) meta[gameId] = {};
  meta[gameId].note = note;
  saveGameMeta(meta);

  const cfg     = loadConfig();
  const session = loadSession();
  const tid     = session.tournament_id;
  if (!cfg.gh_token || !tid) { alert('✅ ローカルに保存しました。\n（GitHub設定または大会IDが未設定のためGitHubへの書き込みはスキップしました）'); return; }

  const btn  = ta.parentElement.querySelector('.meta-save-btn') || ta.nextElementSibling;
  const orig = btn?.textContent || '';
  if (btn) { btn.disabled = true; btn.textContent = '保存中...'; }
  try {
    const games    = loadCurrentData().games || [];
    const enriched = enrichGamesWithMeta(games, session);
    const now      = new Date().toISOString().slice(0, 19);
    await ghWrite('data/' + tid + '.json', {
      tournament_id:   tid,
      tournament_name: session.tournament_name || '',
      game_date:       session.game_date || '',
      games:           enriched,
      last_updated:    now,
    }, 'テキスト更新: ' + gameId);
    if (btn) btn.textContent = '✅ 保存しました';
    setTimeout(() => { if (btn) { btn.disabled = false; btn.textContent = orig; } }, 2500);
  } catch(e) {
    if (btn) btn.textContent = '❌ ' + e.message;
    setTimeout(() => { if (btn) { btn.disabled = false; btn.textContent = orig; } }, 4000);
  }
}

async function saveCustomNote(id) {
  const ta = document.getElementById('note-ta-' + id);
  if (!ta) return;
  const note = ta.value.trim();

  const btn  = ta.parentElement.querySelector('.meta-save-btn') || ta.nextElementSibling;
  const orig = btn?.textContent || '';

  // キャッシュを更新
  const cached = cachedManualScores.find(s => s.id === id);
  if (cached) cached.game.note = note;

  const cfg = loadConfig();
  if (!cfg.gh_token || !cfg.gh_owner || !cfg.gh_repo) { alert('GitHub設定が必要です。'); return; }
  if (btn) { btn.disabled = true; btn.textContent = '保存中...'; }
  try {
    const path = 'data/' + id + '.json';
    const existing = await ghRead(path);
    let content = { last_updated: new Date().toISOString(), games: [] };
    if (existing?.content) {
      const bin = atob(existing.content.replace(/\n/g, ''));
      content = JSON.parse(new TextDecoder('utf-8').decode(Uint8Array.from(bin, c => c.charCodeAt(0))));
    }
    if (content.games?.[0]) content.games[0].note = note;
    content.last_updated = new Date().toISOString();
    await ghWrite(path, content, 'テキスト更新: ' + id);
    if (btn) btn.textContent = '✅ 保存しました';
    setTimeout(() => { if (btn) { btn.disabled = false; btn.textContent = orig; } }, 2500);
  } catch(e) {
    if (btn) btn.textContent = '❌ ' + e.message;
    setTimeout(() => { if (btn) { btn.disabled = false; btn.textContent = orig; } }, 4000);
  }
}

function renderGames(games) {
  if (!games?.length)
    return '<div class="no-games">試合データがありません。<br>試合がある日は自動クロールされます。</div>';
  const visible = games.filter(g => !HIDDEN_REGIONS.some(kw => (g.region||'').includes(kw)));
  if (!visible.length)
    return '<div class="no-games">試合データがありません。</div>';
  const byRegion = {};
  for (const g of visible) { const k=g.region||'不明'; if(!byRegion[k])byRegion[k]=[]; byRegion[k].push(g); }
  const entries = Object.entries(byRegion);
  // 奇数インデックス→左列、偶数インデックス→右列（読み順：左右左右…）
  const leftCol  = entries.filter((_, i) => i % 2 === 0);
  const rightCol = entries.filter((_, i) => i % 2 === 1);
  const buildSection = ([region, gs]) =>
    '<div class="region-section" data-region="'+esc(region)+'">'
    +'<div class="region-header">'
    +'<span>🏟 '+esc(region)+'</span>'
    +'<button class="region-toggle-btn" onclick="toggleRegion(this)">閉じる</button>'
    +'</div>'
    + gs.map(buildCard).join('') + '</div>';
  return '<div class="region-grid">'
    + '<div class="region-col">' + leftCol.map(buildSection).join('') + '</div>'
    + '<div class="region-col">' + rightCol.map(buildSection).join('') + '</div>'
    + '</div>';
}

// ═══════════════════════════════════════════════════
//  カスタムスコア（手動作成）

let cachedManualScores = [];

async function loadAndRenderManualScores() {
  const el = document.getElementById('custom-scores-content');
  if (!el) return;
  el.innerHTML = '<div style="color:var(--text-dim);font-size:13px;padding:10px 0;">読み込み中...</div>';

  const base = location.href.replace(/\?.*$/,'').replace(/[^/]*$/,'');
  cachedManualScores = [];

  try {
    // GitHub Pages の index.json から type:"manual" エントリを取得
    // → localStorageに依存しないのでどのPCからでも全カスタムスコアが見える
    const idxRes = await fetch(base + 'data/index.json?_=' + Date.now());
    if (!idxRes.ok) throw new Error('index.json が取得できません');
    const index = await idxRes.json();
    const manualEntries = (index.tournaments || [])
      .filter(t => t.type === 'manual')
      .sort((a, b) => (b.date || '').localeCompare(a.date || ''));

    if (!manualEntries.length) {
      el.innerHTML = '<div style="color:var(--text-dim);font-size:13px;padding:10px 0;">'
        + 'カスタムスコアはありません。'
        + '<a href="score_creator.html" style="color:var(--accent);">スコア作成ツール</a>で作成できます。</div>';
      return;
    }

    for (const entry of manualEntries) {
      try {
        const res = await fetch(base + 'data/' + encodeURIComponent(entry.id) + '.json?_=' + Date.now());
        if (!res.ok) continue;
        const data = await res.json();
        const game = (data.games || [])[0];
        if (game) cachedManualScores.push({ id: entry.id, game });
      } catch(e) { console.warn('カスタムスコア読み込み失敗:', entry.id, e); }
    }
  } catch(e) {
    // フォールバック：index.json が取得できない場合は localStorage のIDリストを使用
    console.warn('index.json 読み込み失敗、localStorageにフォールバック:', e);
    const ids = loadManualIds();
    for (const id of ids) {
      try {
        const res = await fetch(base + 'data/' + encodeURIComponent(id) + '.json?_=' + Date.now());
        if (!res.ok) continue;
        const data = await res.json();
        const game = (data.games || [])[0];
        if (game) cachedManualScores.push({ id, game });
      } catch(e2) { console.warn('カスタムスコア読み込み失敗:', id, e2); }
    }
  }

  renderManualScores();
}

function buildCustomCard(id, game) {
  const hasScore = (game.total1 !== '' && game.total1 != null) || (game.total2 !== '' && game.total2 != null);
  const scoreStr = hasScore
    ? (game.team1||'?') + '　' + (game.total1||'−') + '－' + (game.total2||'−') + '　' + (game.team2||'?')
    : (game.team1||'?') + ' vs ' + (game.team2||'?');
  const isEnd     = (game.game_status || '').includes('終了');
  const _inn1c    = (game.innings1 || [])[0];
  const isPlaying = !isEnd && _inn1c !== '' && _inn1c != null;
  const isNew     = !isEnd && !isPlaying && !!(game.team1 || game.team2);

  // iframeタグ
  const origin = (location.origin && location.origin !== 'null') ? location.origin : '';
  const widgetBase = origin + location.pathname.replace(/[^/]*$/, '') + 'score_widget.html';
  const wq = new URLSearchParams({ tournament: id, id: game.id || id });
  const widgetUrl = widgetBase + '?' + wq.toString();
  const csafeId   = (game.id || id).replace(/[^a-zA-Z0-9_-]/g, '_');
  const iframeTag = '<iframe id="ks-' + csafeId + '" src="' + widgetUrl + '" width="100%" height="160" frameborder="0" scrolling="no" style="border:none;border-radius:10px;display:block;"></iframe>\n<script>(function(){var f=document.getElementById(\'ks-' + csafeId + '\');if(!f)return;window.addEventListener(\'message\',function(e){if(e.data&&e.data.type===\'koya-resize\'&&e.source===f.contentWindow)f.style.height=e.data.height+\'px\';});})();<\\/script>';

  // スコアテーブル
  const innCnt = effectiveInnCount(game.innings1, game.innings2);
  const inn1 = pad(game.innings1 || [], innCnt).slice(0, innCnt);
  const inn2 = pad(game.innings2 || [], innCnt).slice(0, innCnt);
  const [w1, w2] = winLose(game.total1, game.total2);

  let th = '<th class="team-name">チーム</th>';
  for (let i = 1; i <= innCnt; i++) th += '<th>' + i + '</th>';
  th += '<th>計</th>';

  const row = (name, inns, total, win) => {
    let r = '<tr><td class="team-name">' + (esc(name) || '(未定)') + '</td>';
    inns.forEach(s => {
      const ok = s !== '' && s != null;
      r += '<td class="inn' + (ok ? ' scored' : '') + '">' + (ok ? esc(s) : '−') + '</td>';
    });
    const wc = win === true ? 'win' : win === false ? 'lose' : '';
    r += '<td class="total ' + wc + '">' + (esc(total) || '−') + '</td></tr>';
    return r;
  };

  const safeId = esc(id);
  const editUrl = 'score_creator.html?edit=' + encodeURIComponent(id);

  return '<div class="game-card" data-custom-id="' + safeId + '">'
    + '<div class="card-header" onclick="toggleCustomCard(this)">'
    + (isEnd ? '<span class="badge ended">終了</span>' : isPlaying ? '<span class="badge playing">試合中</span>' : isNew ? '<span class="badge new">NEW</span>' : '')
    + '<span class="card-summary">' + esc(scoreStr) + '</span>'
    + '<button class="btn sub sm" style="flex-shrink:0;" onclick="event.stopPropagation();location.href=\'' + editUrl + '\'">✏️ 編集</button>'
    + '<button class="btn danger sm" style="flex-shrink:0;" onclick="event.stopPropagation();deleteManualScore(\'' + safeId + '\',this)">🗑 削除</button>'
    + '<button class="card-toggle-btn" style="flex-shrink:0;">開く ▼</button>'
    + '</div>'
    + '<div class="card-body collapsed">'
    + '<table class="score-table"><thead><tr>' + th + '</tr></thead><tbody>'
    + row(game.team1 || '?', inn1, game.total1, w1)
    + row(game.team2 || '?', inn2, game.total2, w2)
    + '</tbody></table>'
    + '<div style="border-top:1px solid var(--border);padding:6px 14px;background:var(--surface2);display:flex;align-items:center;gap:8px;">'
    + '<button class="embed-btn" onclick="toggleNotePanel(this)">📝 テキスト追加</button>'
    + '<span style="font-size:11px;color:var(--text-dim);">戦評・投手交代・コールドなど</span>'
    + '</div>'
    + '<div class="note-panel" style="display:none;border-top:1px solid var(--border);padding:10px 14px;background:#fffef0;">'
    + '<label style="font-size:11px;color:var(--text-dim);display:block;margin-bottom:5px;">テキスト（スコアの下に表示されます）</label>'
    + '<textarea id="note-ta-' + safeId + '" rows="3"'
    + ' style="width:100%;background:#fff;border:1px solid var(--border);border-radius:5px;padding:7px 9px;font-size:13px;font-family:inherit;resize:vertical;"'
    + ' placeholder="例：7回コールド&#10;投手交代：先発●● → 5回●●">'
    + esc(game.note || '') + '</textarea>'
    + '<button class="meta-save-btn" style="margin-top:6px;" onclick="saveCustomNote(\'' + safeId + '\')">💾 保存</button>'
    + '</div>'
    + '<div style="border-top:1px solid var(--border);padding:6px 14px;background:var(--surface2);display:flex;align-items:center;gap:8px;">'
    + '<button class="embed-btn" onclick="toggleEmbed(this)">🔗 埋め込みコード</button>'
    + '<span style="font-size:11px;color:var(--text-dim);">他サイトに貼り付けて使用</span>'
    + '</div>'
    + '<div class="embed-panel">'
    + '<code id="cs-code-' + safeId + '">' + esc(iframeTag) + '</code>'
    + '<button class="embed-copy-btn" onclick="copyManualEmbed(\'' + safeId + '\')">📋 コードをコピー</button>'
    + '</div>'
    + '</div></div>';
}

function renderManualScores() {
  const el = document.getElementById('custom-scores-content');
  if (!el) return;
  if (!cachedManualScores.length) {
    el.innerHTML = '<div style="color:var(--text-dim);font-size:13px;padding:10px 0;">'
      +'カスタムスコアはありません（データが見つかりませんでした）。</div>';
    return;
  }
  el.innerHTML = cachedManualScores.map(({ id, game }) => buildCustomCard(id, game)).join('');
}

function toggleCustomCard(header) {
  const card = header.closest('.game-card');
  const body = card.querySelector('.card-body');
  const btn  = card.querySelector('.card-toggle-btn');
  const sum  = card.querySelector('.card-summary');
  if (body.classList.contains('collapsed')) {
    body.classList.remove('collapsed');
    btn.textContent = '閉じる ▲';
    if (sum) sum.textContent = '';
  } else {
    body.classList.add('collapsed');
    btn.textContent = '開く ▼';
    if (sum) {
      const tds  = card.querySelectorAll('td.team-name');
      const tots = card.querySelectorAll('td.total');
      const t1 = tds[0]?.textContent || '', t2 = tds[1]?.textContent || '';
      const s1 = tots[0]?.textContent || '', s2 = tots[1]?.textContent || '';
      sum.textContent = (s1 || s2) ? t1 + '　' + s1 + '－' + s2 + '　' + t2 : t1 + ' vs ' + t2;
    }
  }
}

function deleteManualScore(id, btn) {
  if (!confirm('このカスタムスコアをモニターから非表示にしますか？\n（過去のスコア一覧には残ります）')) return;
  // localStorage からのみ削除。GitHub データは残すので過去のスコア一覧に引き続き表示される
  saveManualIds(loadManualIds().filter(i => i !== id));
  cachedManualScores = cachedManualScores.filter(s => s.id !== id);
  renderManualScores();
}

function copyManualEmbed(id) {
  const el = document.getElementById('cs-code-' + id);
  if (!el) return;
  const text = el.textContent.trim();
  const done = () => {
    el.style.background = '#d1fae5';
    setTimeout(() => { el.style.background = ''; }, 1500);
  };
  if (navigator.clipboard) { navigator.clipboard.writeText(text).then(done).catch(() => {}); }
  else { const ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); done(); }
}

async function ghDeleteFile(path, msg) {
  const existing = await ghRead(path);
  if (!existing?.sha) return;
  return await ghRequest('DELETE', path, {
    message: msg || '削除',
    sha: existing.sha,
    branch: loadConfig().gh_branch || 'main',
  });
}

// ═══════════════════════════════════════════════════
//  起動
// ═══════════════════════════════════════════════════
async function init() {
  const cfg = loadConfig();
  intervalMinutes = (cfg.interval_minutes != null) ? cfg.interval_minutes : 5;
  document.getElementById('intervalSelect').value = String(intervalMinutes);

  // GitHub設定を復元
  if (cfg.gh_token) document.getElementById('cfgToken').value = cfg.gh_token;
  if (cfg.gh_owner) document.getElementById('cfgOwner').value = cfg.gh_owner;
  if (cfg.gh_repo)  document.getElementById('cfgRepo').value  = cfg.gh_repo;
  document.getElementById('cfgBranch').value = cfg.gh_branch || 'main';

  // セッションを復元
  const ses = loadSession();
  document.getElementById('sesName').value = ses.tournament_name || '';
  document.getElementById('sesId').value   = ses.tournament_id   || autoTournamentId();
  document.getElementById('sesDate').value = ses.game_date       || new Date().toISOString().slice(0,10);
  updateDateLabel();
  if (!ses.tournament_id) saveSession(); // 初回：自動IDを保存

  render();
  loadAndRenderManualScores(); // カスタムスコアを非同期で読み込み
  if (intervalMinutes === 0) {
    await refreshDisplay();
    startReloadScheduler();
  } else {
    await runCrawl();
    startScheduler();
  }
  startCountdown();
}

init();
</script>
