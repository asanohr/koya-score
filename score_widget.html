<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スコアウィジェット</title>
  <style>
    :root{
      --surface:#fff;--surface2:#f5f7fa;--border:#dde3ed;
      --text:#1a1d27;--text-dim:#555;--accent:#1d6fd8;
      --win:#16a34a;--lose:#6b7280;--radius:10px;--playing:#d97757;--pre:#9ca3af;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:transparent;color:var(--text);font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;font-size:15px;}
    .wh{
      background:var(--accent);color:#fff;
      padding:7px 12px;border-radius:var(--radius) var(--radius) 0 0;
      display:flex;align-items:center;justify-content:space-between;gap:8px;
      font-size:14px;font-weight:700;
    }
    .wh .ti{font-size:14px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .sb{
      padding:24px;text-align:center;color:var(--text-dim);
      background:var(--surface);border:1px solid var(--border);
      border-top:none;border-radius:0 0 var(--radius) var(--radius);
    }
    .sp{
      display:inline-block;width:22px;height:22px;
      border:3px solid var(--border);border-top-color:var(--accent);
      border-radius:50%;animation:spin .7s linear infinite;margin-bottom:8px;
    }
    @keyframes spin{to{transform:rotate(360deg);}}
    .gl{
      border:1px solid var(--border);border-top:none;
      border-radius:0 0 var(--radius) var(--radius);
      overflow-x:auto;overflow-y:hidden;background:var(--surface);
      -webkit-overflow-scrolling:touch;
    }
    .gi{border-top:1px solid var(--border);}
    .gi:first-child{border-top:none;}
    .st{width:100%;border-collapse:collapse;}
    .st th{
      text-align:center;padding:4px 3px;font-size:13px;
      color:var(--text-dim);font-weight:600;background:var(--surface2);
      border-top:1px solid var(--border);min-width:22px;
    }
    .st td{
      text-align:center;padding:5px 3px;
      border-top:1px solid var(--border);font-size:15px;font-weight:600;min-width:22px;
    }
    .st td.tn{
      text-align:left;padding-left:12px;font-weight:700;font-size:15px;
      min-width:100px;max-width:160px;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);
    }
    .st td.inn{color:var(--text-dim);}
    .st td.inn.ok{color:var(--text);}
    .st td.tot{font-size:18px;font-weight:800;border-left:1px solid var(--border);}
    .st td.tot.win{color:var(--win);}
    .st td.tot.lose{color:var(--lose);}
    @media(max-width:480px){
      .wh .ti{font-size:clamp(10px, 3.3vw, 13px);}
      .st th{font-size:11px;padding:3px 2px;min-width:18px;}
      .st td{font-size:13px;padding:4px 2px;min-width:18px;}
      .st td.tn{font-size:14px;min-width:72px;max-width:100px;padding-left:8px;}
      .st td.tot{font-size:15px;}
    }
    .nm{
      padding:20px;text-align:center;color:var(--text-dim);font-size:13px;line-height:1.8;
      background:var(--surface);border:1px solid var(--border);
      border-top:none;border-radius:0 0 var(--radius) var(--radius);
    }
    .gn{
      padding:8px 12px;font-size:13px;color:var(--text-dim);line-height:1.7;
      background:var(--surface);
    }
  </style>
</head>
<body>
<div id="root"></div>
<script>
// ── URLパラメータ ──
const params      = new URLSearchParams(location.search);
const P_TOURNAMENT = (params.get('tournament') || '').trim(); // 大会ID（必須）
const P_ID         = (params.get('id')         || '').trim(); // 試合ID（必須）
const P_THEME      = params.get('theme') || 'light';
const REFRESH      = parseInt(params.get('refresh') || '5') * 60 * 1000;

// ── ダークモード ──
if (P_THEME === 'dark') {
  const r = document.documentElement.style;
  r.setProperty('--surface','#22263a'); r.setProperty('--surface2','#1e2235');
  r.setProperty('--border','#333a55'); r.setProperty('--text','#e8eaf0');
  r.setProperty('--text-dim','#8a93b2');
  document.body.style.background = 'var(--surface)';
}

// ── ユーティリティ ──
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function pad(a, n) { const r = [...a]; while (r.length < n) r.push(''); return r; }
function wl(a, b) {
  const x = parseInt(a), y = parseInt(b);
  if (isNaN(x) || isNaN(y)) return [null, null];
  return x > y ? [true, false] : x < y ? [false, true] : [null, null];
}
function setRoot(h) { document.getElementById('root').innerHTML = h; }

// ── 表示 ──
function showLoading() {
  setRoot('<div class="wh"><span class="ti">⚾ 読み込み中...</span></div>'
    + '<div class="sb"><div class="sp"></div><br>データを取得しています</div>');
}
function showError(msg) {
  setRoot('<div class="wh"><span class="ti">⚾ スコアウィジェット</span></div>'
    + '<div class="nm">⚠️ ' + esc(msg) + '</div>');
}

function renderGame(g) {
  // 延長判定：10回以降に実際の得点がある回まで表示、なければ9回で打ち切り
  const raw1 = g.innings1 || [], raw2 = g.innings2 || [];
  let maxInn = 9;
  const rawMax = Math.max(raw1.length, raw2.length);
  for (let i = 9; i < rawMax; i++) {
    const v1 = raw1[i] != null ? String(raw1[i]) : '';
    const v2 = raw2[i] != null ? String(raw2[i]) : '';
    if (v1 !== '' || v2 !== '') maxInn = i + 1;
  }
  const i1 = pad(raw1, maxInn).slice(0, maxInn);
  const i2 = pad(raw2, maxInn).slice(0, maxInn);
  const [w1, w2] = wl(g.total1, g.total2);

  // ヘッダー：大会名　その他情報（日付・回戦・会場）
  const parts = [];
  if (g.tournament_name) {
    parts.push(g.tournament_name);
    if (g.extra_info) parts.push(g.extra_info);
  } else {
    if (g.game_date_label) parts.push(g.game_date_label);
    if (g.venue)           parts.push(g.venue);
    if (g.round)           parts.push(g.round);
  }
  const title = parts.join('　') || '試合スコア';

  const isEnd     = (g.game_status || '').includes('終了');
  const isPlaying = !isEnd && (raw1.some(v => v !== '' && v != null) || raw2.some(v => v !== '' && v != null));
  const headerBg  = isPlaying ? 'var(--playing)' : isEnd ? 'var(--accent)' : 'var(--pre)';
  const endBadge = isEnd
    ? '<span style="background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.5);border-radius:4px;font-size:10px;font-weight:700;padding:2px 8px;white-space:nowrap;flex-shrink:0;">終了</span>'
    : '';

  let th = '<th style="text-align:left;padding-left:12px;">チーム</th>';
  for (let i = 1; i <= maxInn; i++) th += '<th>' + i + '</th>';
  th += '<th>計</th>';

  const row = (nm, ins, tot, win) => {
    let r = '<tr><td class="tn">' + (esc(nm) || '(未定)') + '</td>';
    ins.forEach(s => {
      const ok = s !== '' && s != null;
      r += '<td class="inn' + (ok ? ' ok' : '') + '">' + (ok ? esc(s) : '−') + '</td>';
    });
    const wc = win === true ? 'win' : win === false ? 'lose' : '';
    r += '<td class="tot ' + wc + '">' + (esc(tot) || '−') + '</td></tr>';
    return r;
  };

  const noteHtml = g.note
    ? '<div class="gn">' + esc(g.note).replace(/\n/g, '<br>') + '</div>'
    : '';

  setRoot(
    '<div class="wh" style="background:' + headerBg + '"><span class="ti">⚾ ' + esc(title) + '</span>' + endBadge + '</div>'
    + '<div class="gl"><div class="gi">'
    + '<table class="st"><thead><tr>' + th + '</tr></thead><tbody>'
    + row(g.team1, i1, g.total1, w1)
    + row(g.team2, i2, g.total2, w2)
    + '</tbody></table></div></div>'
    + noteHtml
  );
}

// ── データ取得 ──
async function load() {
  if (!P_TOURNAMENT) {
    if (P_ID) {
      showError('このiframeコードは古い形式です。monitor_index.html を開き、試合カードの「🔗 埋め込みコード」から新しいコードを取得してください。');
    } else {
      showError('URLパラメータ "tournament" と "id" が必要です');
    }
    return;
  }
  if (!P_ID) { showError('URLパラメータ "id" が指定されていません'); return; }
  showLoading();

  // score_widget.html と同じオリジンの data/{tournament}.json を取得
  const base    = location.href.replace(/\?.*$/, '').replace(/[^/]*$/, '');
  const dataUrl = base + 'data/' + encodeURIComponent(P_TOURNAMENT) + '.json';

  try {
    // ?_= でブラウザキャッシュを回避（CDNキャッシュは別途）
    const res = await fetch(dataUrl + '?_=' + Date.now());
    if (!res.ok) throw new Error('大会データが見つかりません（' + P_TOURNAMENT + '）');
    const data = await res.json();
    const game = (data.games || []).find(g => g.id === P_ID);
    if (!game) {
      setRoot(
        '<div class="wh"><span class="ti">⚾ スコアウィジェット</span></div>'
        + '<div class="nm">この試合のデータが見つかりません'
        + '<div style="margin-top:8px;font-size:11px;">ID: ' + esc(P_ID) + '<br>大会: ' + esc(P_TOURNAMENT) + '</div></div>'
      );
      return;
    }
    renderGame(game);
  } catch(e) {
    showError(String(e));
  }
}

load();
setInterval(load, REFRESH);
</script>
</body>
</html>
