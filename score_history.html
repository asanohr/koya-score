<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>過去のスコア一覧 - 兵庫県高校野球連盟</title>
  <style>
    :root {
      --bg:#f0f4f8; --surface:#fff; --surface2:#f5f7fa; --border:#dde3ed;
      --text:#1a1d27; --text-dim:#555; --accent:#1d6fd8; --win:#16a34a; --radius:10px;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;font-size:14px;}

    header{
      background:var(--surface);border-bottom:1px solid var(--border);
      padding:12px 20px;display:flex;align-items:center;justify-content:space-between;
      flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:100;
    }
    header h1{font-size:16px;font-weight:700;color:var(--accent);}
    .btn{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:13px;cursor:pointer;transition:opacity .15s;font-family:inherit;}
    .btn:hover{opacity:.85;}
    .btn.sub{background:var(--surface2);color:var(--text-dim);border:1px solid var(--border);}

    main{max-width:900px;margin:0 auto;padding:20px 14px 60px;}

    /* 検索バー */
    .toolbar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
    .toolbar input{
      flex:1;min-width:200px;padding:8px 12px;
      border:1px solid var(--border);border-radius:6px;
      background:var(--surface);color:var(--text);font-size:13px;font-family:inherit;
    }
    .toolbar input:focus{outline:2px solid var(--accent);}
    .count-label{font-size:13px;color:var(--text-dim);white-space:nowrap;}

    /* 大会カード */
    .tournament-card{
      background:var(--surface);border:1px solid var(--border);
      border-radius:var(--radius);margin-bottom:12px;overflow:hidden;
    }
    .tournament-header{
      padding:12px 16px;display:flex;align-items:center;gap:12px;
      cursor:pointer;user-select:none;
    }
    .tournament-header:hover{background:var(--surface2);}
    .t-date{
      background:var(--accent);color:#fff;border-radius:5px;
      padding:3px 10px;font-size:12px;font-weight:700;white-space:nowrap;flex-shrink:0;
    }
    .t-name{font-size:15px;font-weight:700;flex:1;}
    .t-count{font-size:12px;color:var(--text-dim);white-space:nowrap;}
    .t-arrow{font-size:12px;color:var(--text-dim);flex-shrink:0;}
    .tournament-body{display:none;border-top:1px solid var(--border);}
    .tournament-body.open{display:block;}

    /* 試合行 */
    .game-row{border-top:1px solid var(--border);}
    .game-row:first-child{border-top:none;}
    .game-summary{
      padding:9px 16px;display:flex;align-items:center;gap:10px;
      cursor:pointer;user-select:none;background:var(--surface2);
    }
    .game-summary:hover{background:#edf2f9;}
    .g-title{flex:1;font-size:13px;font-weight:600;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .g-score{font-size:13px;font-weight:700;white-space:nowrap;flex-shrink:0;color:var(--accent);}
    .badge-end{
      display:inline-block;padding:1px 7px;border-radius:4px;font-size:10px;font-weight:700;
      background:rgba(107,114,128,.12);color:#6b7280;border:1px solid rgba(107,114,128,.3);
      white-space:nowrap;flex-shrink:0;
    }
    .g-arrow{font-size:11px;color:var(--text-dim);flex-shrink:0;}

    /* iframeコード欄 */
    .embed-detail{display:none;padding:10px 16px;background:#f8f9fc;border-top:1px solid var(--border);}
    .embed-detail.open{display:block;}
    .embed-detail label{font-size:11px;color:var(--text-dim);display:block;margin-bottom:4px;}
    .embed-detail code{
      display:block;background:#eef1f7;border:1px solid var(--border);
      border-radius:5px;padding:7px 10px;font-size:11px;
      word-break:break-all;color:var(--text);line-height:1.6;font-family:monospace;
    }
    .copy-btn{
      margin-top:6px;background:var(--accent);color:#fff;border:none;
      border-radius:5px;padding:5px 12px;font-size:12px;cursor:pointer;
      font-family:inherit;transition:opacity .15s;
    }
    .copy-btn:hover{opacity:.85;} .copy-btn.copied{background:var(--win);}
    .id-note{margin-top:6px;font-size:11px;color:var(--text-dim);}

    /* 空状態・エラー */
    .empty{text-align:center;padding:60px 20px;color:var(--text-dim);font-size:15px;line-height:2.2;}
    .loading{text-align:center;padding:40px 20px;color:var(--text-dim);}
    .sp{display:inline-block;width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:12px;}
    @keyframes spin{to{transform:rotate(360deg);}}

    @media(max-width:600px){
      .t-date{display:none;}
      .g-score{font-size:12px;}
    }
  </style>
</head>
<body>
<header>
  <h1>📋 過去のスコア一覧</h1>
  <button class="btn sub" onclick="window.location.href=new URL('monitor_index.html',location.href).href">← モニターへ戻る</button>
</header>

<main>
  <div class="toolbar">
    <input type="search" id="searchBox" placeholder="大会名・チーム名・地区で絞り込み..." oninput="applyFilter()">
    <span class="count-label" id="countLabel"></span>
  </div>
  <div id="content"><div class="loading"><div class="sp"></div><br>データを読み込んでいます...</div></div>
</main>

<script>
function esc(s) {
  return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(iso) {
  if (!iso) return '';
  // "2026-05-23" → "2026/05/23"
  const parts = iso.slice(0,10).split('-');
  if (parts.length < 3) return iso;
  return parseInt(parts[0]) + '年' + parseInt(parts[1]) + '月' + parseInt(parts[2]) + '日';
}

// ── データ取得 ──
const base = location.href.replace(/\?.*$/,'').replace(/[^/]*$/,'');

async function fetchJson(path) {
  const res = await fetch(base + path + '?_=' + Date.now());
  if (!res.ok) throw new Error('HTTP ' + res.status + ': ' + path);
  return await res.json();
}

// ── 全大会データ ──
let allTournaments = [];   // index.json の tournaments 配列
let loadedGames   = {};    // { tournamentId: games[] }

async function init() {
  try {
    const index = await fetchJson('data/index.json');
    allTournaments = (index.tournaments || []).sort((a,b) => (b.date||'').localeCompare(a.date||''));
    renderTournamentList(allTournaments);
  } catch(e) {
    if (e.message.includes('404')) {
      document.getElementById('content').innerHTML =
        '<div class="empty">まだ大会データがありません。<br>monitor_index.html を開いてクロールを実行すると、<br>ここに試合データが蓄積されます。</div>';
    } else {
      document.getElementById('content').innerHTML =
        '<div class="empty">⚠️ 読み込みエラー：' + esc(e.message) + '</div>';
    }
  }
}

function renderTournamentList(tournaments) {
  document.getElementById('countLabel').textContent = tournaments.length + '大会';
  if (!tournaments.length) {
    document.getElementById('content').innerHTML =
      '<div class="empty">該当する大会がありません。</div>';
    return;
  }
  document.getElementById('content').innerHTML = tournaments.map(t => {
    const dateStr = t.date ? fmtDate(t.date) : '';
    return '<div class="tournament-card" data-id="' + esc(t.id) + '">'
      + '<div class="tournament-header" onclick="toggleTournament(this)">'
      + (dateStr ? '<span class="t-date">' + esc(dateStr) + '</span>' : '')
      + '<span class="t-name">🏆 ' + esc(t.name || t.id) + '</span>'
      + '<span class="t-count">' + (t.game_count || 0) + '試合</span>'
      + '<span class="t-arrow">▼</span>'
      + '</div>'
      + '<div class="tournament-body" id="tbody-' + esc(t.id) + '">'
      + '<div class="loading" style="padding:20px;"><div class="sp" style="width:20px;height:20px;border-width:2px;"></div></div>'
      + '</div>'
      + '</div>';
  }).join('');
}

async function toggleTournament(header) {
  const card  = header.closest('.tournament-card');
  const body  = card.querySelector('.tournament-body');
  const arrow = header.querySelector('.t-arrow');
  const id    = card.dataset.id;

  if (body.classList.contains('open')) {
    body.classList.remove('open'); arrow.textContent = '▼'; return;
  }
  body.classList.add('open'); arrow.textContent = '▲';

  // まだ読み込んでいなければ取得
  if (!loadedGames[id]) {
    try {
      const data = await fetchJson('data/' + encodeURIComponent(id) + '.json');
      loadedGames[id] = data.games || [];
    } catch(e) {
      body.innerHTML = '<div class="empty" style="padding:20px;">読み込み失敗: ' + esc(e.message) + '</div>';
      return;
    }
  }
  renderGames(body, id, loadedGames[id]);
}

function renderGames(body, tournamentId, games) {
  if (!games.length) {
    body.innerHTML = '<div class="empty" style="padding:20px;">試合データがありません。</div>';
    return;
  }
  // 地区ごとにグループ化
  const byRegion = {};
  for (const g of games) {
    const k = g.region || '不明';
    if (!byRegion[k]) byRegion[k] = [];
    byRegion[k].push(g);
  }
  body.innerHTML = Object.entries(byRegion).map(([region, gs]) => {
    const rows = gs.map(g => {
      const isEnd  = (g.game_status||'').includes('終了');
      const parts  = [];
      if (g.venue) parts.push(g.venue);
      if (g.round) parts.push(g.round);
      if (g.team1 && g.team2) parts.push(g.team1 + ' vs ' + g.team2);
      const titleStr = parts.join('　') || g.round;
      const dateStr  = g.game_date_label ? '(' + g.game_date_label + ') ' : '';
      const scoreStr = (g.total1 !== '' && g.total2 !== '') ? g.total1 + '－' + g.total2 : '';

      // iframeコードを再構成（widgetUrlはこのページの同一オリジン）
      const widgetUrl = base + 'score_widget.html?id=' + encodeURIComponent(g.id) + '&tournament=' + encodeURIComponent(tournamentId);
      const teamLabel  = (g.team1 && g.team2) ? g.team1 + ' vs ' + g.team2 : g.round;
      const iframeCode = '<iframe src="' + widgetUrl + '" width="700" height="160" style="border:none;border-radius:10px;" loading="lazy" title="' + teamLabel + ' スコア"></iframe>';

      return '<div class="game-row">'
        + '<div class="game-summary" onclick="toggleGame(this)">'
        + '<span class="g-title">⚾ ' + esc(dateStr + titleStr) + '</span>'
        + (isEnd ? '<span class="badge-end">終了</span>' : '')
        + (scoreStr ? '<span class="g-score">' + esc(scoreStr) + '</span>' : '')
        + '<span class="g-arrow">▼</span>'
        + '</div>'
        + '<div class="embed-detail" data-iframe="' + esc(iframeCode) + '">'
        + '<label>iframeコード（他サイトのHTMLに貼り付けて使用）：</label>'
        + '<code>' + esc(iframeCode) + '</code>'
        + '<button class="copy-btn" onclick="copyCode(this)">📋 コードをコピー</button>'
        + '<div class="id-note">🔑 試合ID: <b>' + esc(g.id) + '</b>　大会ID: <b>' + esc(tournamentId) + '</b></div>'
        + '</div>'
        + '</div>';
    }).join('');
    return '<div style="padding:8px 16px 4px;font-size:12px;font-weight:700;color:var(--text-dim);">🏟 ' + esc(region) + '</div>' + rows;
  }).join('');
}

function toggleGame(summary) {
  const detail = summary.nextElementSibling;
  const arrow  = summary.querySelector('.g-arrow');
  const isOpen = detail.classList.contains('open');
  detail.classList.toggle('open');
  arrow.textContent = isOpen ? '▼' : '▲';
}

function copyCode(btn) {
  const code = btn.previousElementSibling;
  const text = code.textContent.trim();
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✔ コピーしました！'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 コードをコピー'; btn.classList.remove('copied'); }, 2000);
  }).catch(() => {
    const sel = window.getSelection(), range = document.createRange();
    range.selectNodeContents(code); sel.removeAllRanges(); sel.addRange(range);
  });
}

function applyFilter() {
  const q = document.getElementById('searchBox').value.trim().toLowerCase();
  if (!q) { renderTournamentList(allTournaments); return; }
  const filtered = allTournaments.filter(t => {
    const text = [t.name, t.id, t.date].join(' ').toLowerCase();
    return text.includes(q);
  });
  renderTournamentList(filtered);
}

init();
</script>
</body>
</html>
