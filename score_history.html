<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>過去のスコア一覧 - 兵庫県高校野球連盟</title>
  <style>
    :root {
      --bg:#f0f4f8; --surface:#fff; --surface2:#f5f7fa; --border:#dde3ed;
      --text:#1a1d27; --text-dim:#555; --accent:#1d6fd8; --win:#16a34a;
      --danger:#dc2626; --radius:10px;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;font-size:14px;}

    header{
      background:var(--surface);border-bottom:1px solid var(--border);
      padding:12px 20px;display:flex;align-items:center;justify-content:space-between;
      flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:100;
    }
    header h1{font-size:16px;font-weight:700;color:var(--accent);}
    .btn{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:13px;cursor:pointer;transition:opacity .15s;font-family:inherit;text-decoration:none;display:inline-block;}
    .btn:hover{opacity:.85;}
    .btn.sub{background:var(--surface2);color:var(--text-dim);border:1px solid var(--border);}
    .btn.danger{background:var(--danger);color:#fff;border:none;}

    main{max-width:900px;margin:0 auto;padding:20px 14px 60px;}

    /* 管理モードバナー */
    .manage-banner{
      display:none;background:#fef2f2;border:1px solid #fca5a5;
      border-radius:var(--radius);padding:10px 16px;margin-bottom:14px;
      font-size:13px;color:#991b1b;line-height:1.6;
    }
    .manage-banner.show{display:block;}

    /* 検索バー */
    .toolbar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
    .toolbar input{
      flex:1;min-width:200px;padding:8px 12px;
      border:1px solid var(--border);border-radius:6px;
      background:var(--surface);color:var(--text);font-size:13px;font-family:inherit;
    }
    .toolbar input:focus{outline:2px solid var(--accent);}
    .count-label{font-size:13px;color:var(--text-dim);white-space:nowrap;}

    /* 大会カード */
    .tournament-card{
      background:var(--surface);border:1px solid var(--border);
      border-radius:var(--radius);margin-bottom:12px;overflow:hidden;
      transition:border-color .2s;
    }
    .tournament-card.manage-mode{border-color:#fca5a5;}
    .tournament-header{
      padding:12px 16px;display:flex;align-items:center;gap:12px;
      cursor:pointer;user-select:none;
    }
    .tournament-header:hover{background:var(--surface2);}
    .t-date{
      background:var(--accent);color:#fff;border-radius:5px;
      padding:3px 10px;font-size:12px;font-weight:700;white-space:nowrap;flex-shrink:0;
    }
    .t-name{font-size:15px;font-weight:700;flex:1;}
    .t-count{font-size:12px;color:var(--text-dim);white-space:nowrap;}
    .t-arrow{font-size:12px;color:var(--text-dim);flex-shrink:0;}
    .tournament-body{display:none;border-top:1px solid var(--border);}
    .tournament-body.open{display:block;}

    /* 削除ボタン */
    .del-btn{
      background:transparent;color:var(--danger);
      border:1px solid #fca5a5;border-radius:5px;
      padding:3px 10px;font-size:12px;cursor:pointer;
      white-space:nowrap;flex-shrink:0;font-family:inherit;
      transition:all .15s;
    }
    .del-btn:hover{background:var(--danger);color:#fff;border-color:var(--danger);}
    .del-btn:disabled{opacity:.5;cursor:not-allowed;}
    .del-btn.sm{padding:2px 8px;font-size:11px;}

    /* 試合行 */
    .game-row{border-top:1px solid var(--border);}
    .game-row:first-child{border-top:none;}
    .game-summary{
      padding:9px 16px;display:flex;align-items:center;gap:10px;
      cursor:pointer;user-select:none;background:var(--surface2);
    }
    .game-summary:hover{background:#edf2f9;}
    .g-title{flex:1;font-size:13px;font-weight:600;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .g-score{font-size:13px;font-weight:700;white-space:nowrap;flex-shrink:0;color:var(--accent);}
    .badge-end{
      display:inline-block;padding:1px 7px;border-radius:4px;font-size:10px;font-weight:700;
      background:rgba(107,114,128,.12);color:#6b7280;border:1px solid rgba(107,114,128,.3);
      white-space:nowrap;flex-shrink:0;
    }
    .g-arrow{font-size:11px;color:var(--text-dim);flex-shrink:0;}

    /* iframeコード欄 */
    .embed-detail{display:none;padding:10px 16px;background:#f8f9fc;border-top:1px solid var(--border);}
    .embed-detail.open{display:block;}
    .embed-detail label{font-size:11px;color:var(--text-dim);display:block;margin-bottom:4px;}
    .embed-detail code{
      display:block;background:#eef1f7;border:1px solid var(--border);
      border-radius:5px;padding:7px 10px;font-size:11px;
      word-break:break-all;color:var(--text);line-height:1.6;font-family:monospace;
    }
    .copy-btn{
      margin-top:6px;background:var(--accent);color:#fff;border:none;
      border-radius:5px;padding:5px 12px;font-size:12px;cursor:pointer;
      font-family:inherit;transition:opacity .15s;
    }
    .copy-btn:hover{opacity:.85;} .copy-btn.copied{background:var(--win);}
    .id-note{margin-top:6px;font-size:11px;color:var(--text-dim);}

    /* 空状態・エラー */
    .empty{text-align:center;padding:60px 20px;color:var(--text-dim);font-size:15px;line-height:2.2;}
    .loading{text-align:center;padding:40px 20px;color:var(--text-dim);}
    .sp{display:inline-block;width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:12px;}
    @keyframes spin{to{transform:rotate(360deg);}}

    @media(max-width:600px){
      .t-date{display:none;}
      .g-score{font-size:12px;}
    }
  </style>
</head>
<body>
<header>
  <h1>📋 過去のスコア一覧</h1>
  <div style="display:flex;gap:8px;align-items:center;">
    <button class="btn sub" id="manageBtn" onclick="toggleManage()">🗑 管理</button>
    <a href="score_creator.html" class="btn sub">✏️ スコア作成</a>
    <a href="monitor_index.html" class="btn sub">← モニターへ戻る</a>
  </div>
</header>

<main>
  <div class="manage-banner" id="manageBanner">
    🗑 <b>管理モード</b>：大会・試合の削除ボタンが表示されています。削除すると GitHub 上のデータも消えます。取り消しはできません。
  </div>
  <div class="toolbar">
    <input type="search" id="searchBox" placeholder="大会名・チーム名・地区で絞り込み..." oninput="applyFilter()">
    <span class="count-label" id="countLabel"></span>
  </div>
  <div id="content"><div class="loading"><div class="sp"></div><br>データを読み込んでいます...</div></div>
</main>

<script>
const CONFIG_KEY = 'koya_config';

function esc(s) {
  return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(iso) {
  if (!iso) return '';
  const parts = iso.slice(0,10).split('-');
  if (parts.length < 3) return iso;
  return parseInt(parts[0]) + '年' + parseInt(parts[1]) + '月' + parseInt(parts[2]) + '日';
}

const base = location.href.replace(/\?.*$/,'').replace(/[^/]*$/,'');

async function fetchJson(path) {
  const res = await fetch(base + path + '?_=' + Date.now());
  if (!res.ok) throw new Error('HTTP ' + res.status + ': ' + path);
  return await res.json();
}

let allTournaments = [];
let loadedGames    = {}; // { tournamentId: [ { ...game, _tid } ] }
let manageMode     = false;
let lastFiltered   = null; // 検索中の表示リスト

function nameHash(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = Math.imul(31, h) + s.charCodeAt(i) | 0;
  return (h >>> 0).toString(16);
}

// ── GitHub API ──
function loadConfig() {
  try { return JSON.parse(localStorage.getItem(CONFIG_KEY) || '{}'); } catch { return {}; }
}

async function ghRequest(method, path, body) {
  const cfg = loadConfig();
  if (!cfg.gh_token) throw new Error('GitHubトークンが未設定です。monitor_index.html の ⚙️設定 で入力してください。');
  const url = 'https://api.github.com/repos/' + cfg.gh_owner + '/' + cfg.gh_repo + '/contents/' + path;
  const res = await fetch(url, {
    method,
    headers: { Authorization: 'token ' + cfg.gh_token, 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (res.status === 404) return null;
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || 'HTTP ' + res.status);
  }
  return await res.json();
}

async function ghRead(path) { return await ghRequest('GET', path); }

function ghEncode(str) {
  const bytes = new TextEncoder().encode(str);
  let bin = ''; bytes.forEach(b => bin += String.fromCharCode(b));
  return btoa(bin);
}
function ghDecode(b64) {
  const bin = atob(b64.replace(/\n/g,''));
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new TextDecoder().decode(bytes);
}

async function ghWrite(path, content, msg) {
  const existing = await ghRead(path);
  const body = {
    message: msg,
    content: ghEncode(JSON.stringify(content, null, 2)),
    branch: loadConfig().gh_branch || 'main',
  };
  if (existing?.sha) body.sha = existing.sha;
  return await ghRequest('PUT', path, body);
}

async function ghDeleteFile(path, msg) {
  const existing = await ghRead(path);
  if (!existing) return;
  return await ghRequest('DELETE', path, {
    message: msg,
    sha: existing.sha,
    branch: loadConfig().gh_branch || 'main',
  });
}

// ── 管理モード切替 ──
function toggleManage() {
  manageMode = !manageMode;
  const btn    = document.getElementById('manageBtn');
  const banner = document.getElementById('manageBanner');
  if (manageMode) {
    btn.textContent = '✕ 管理終了';
    btn.className   = 'btn danger';
    banner.className = 'manage-banner show';
  } else {
    btn.textContent = '🗑 管理';
    btn.className   = 'btn sub';
    banner.className = 'manage-banner';
  }
  renderTournamentList(lastFiltered || allTournaments);
}

// ── 大会削除 ──
async function deleteTournament(id, name, event) {
  event.stopPropagation();
  if (!confirm('「' + name + '」を削除しますか？\nGitHub上のデータも削除されます。取り消しはできません。')) return;
  const btn = event.currentTarget;
  btn.textContent = '削除中...'; btn.disabled = true;
  try {
    // index.json から除去
    const indexFile = await ghRead('data/index.json');
    if (indexFile) {
      const index = JSON.parse(ghDecode(indexFile.content));
      index.tournaments = (index.tournaments || []).filter(t => t.id !== id);
      await ghWrite('data/index.json', index, 'Delete tournament: ' + id);
    }
    // 大会JSONを削除
    await ghDeleteFile('data/' + id + '.json', 'Delete tournament data: ' + id);

    // ローカル状態を更新
    allTournaments = allTournaments.filter(t => t.id !== id);
    if (lastFiltered) lastFiltered = lastFiltered.filter(t => t.id !== id);
    delete loadedGames[id];
    renderTournamentList(lastFiltered || allTournaments);
  } catch(e) {
    alert('削除失敗: ' + e.message);
    btn.textContent = '🗑 削除'; btn.disabled = false;
  }
}

// ── 試合削除 ──
async function deleteGame(tournamentId, gameId, event) {
  event.stopPropagation();
  if (!confirm('この試合データを削除しますか？\n取り消しはできません。')) return;
  const btn = event.currentTarget;
  btn.textContent = '削除中...'; btn.disabled = true;
  try {
    const newGames = (loadedGames[tournamentId] || []).filter(g => g.id !== gameId);

    // 大会JSONを更新
    await ghWrite('data/' + tournamentId + '.json', { games: newGames }, 'Delete game: ' + gameId);

    // index.json の game_count を更新
    const indexFile = await ghRead('data/index.json');
    if (indexFile) {
      const index = JSON.parse(ghDecode(indexFile.content));
      const t = (index.tournaments || []).find(t => t.id === tournamentId);
      if (t) t.game_count = newGames.length;
      await ghWrite('data/index.json', index, 'Update game count: ' + tournamentId);
      // allTournaments の game_count も更新
      const at = allTournaments.find(t => t.id === tournamentId);
      if (at) at.game_count = newGames.length;
    }

    loadedGames[tournamentId] = newGames.map(g => ({ ...g, _tid: tournamentId }));
    // グループ内の全試合を結合して再描画
    const groupCard = [...document.querySelectorAll('.tournament-card')]
      .find(c => (c.dataset.ids || '').split(',').includes(tournamentId));
    if (groupCard) {
      const body = groupCard.querySelector('.tournament-body');
      if (body && body.classList.contains('open')) {
        const ids = (groupCard.dataset.ids || '').split(',').filter(Boolean);
        renderGames(body, ids.flatMap(id => loadedGames[id] || []));
      }
    }
  } catch(e) {
    alert('削除失敗: ' + e.message);
    btn.textContent = '削除'; btn.disabled = false;
  }
}

// ── 描画 ──
async function init() {
  try {
    const index = await fetchJson('data/index.json');
    allTournaments = (index.tournaments || []).sort((a,b) => (b.date||'').localeCompare(a.date||''));
    renderTournamentList(allTournaments);
  } catch(e) {
    if (e.message.includes('404')) {
      document.getElementById('content').innerHTML =
        '<div class="empty">まだ大会データがありません。<br>monitor_index.html を開いてクロールを実行すると、<br>ここに試合データが蓄積されます。</div>';
    } else {
      document.getElementById('content').innerHTML =
        '<div class="empty">⚠️ 読み込みエラー：' + esc(e.message) + '</div>';
    }
  }
}

function renderTournamentList(tournaments) {
  // 大会名でグループ化
  const byName = {};
  for (const t of tournaments) {
    const k = t.name || t.id;
    if (!byName[k]) byName[k] = { name: k, tournaments: [], totalGames: 0, latestDate: '' };
    byName[k].tournaments.push(t);
    byName[k].totalGames += (t.game_count || 0);
    if ((t.date || '') > byName[k].latestDate) byName[k].latestDate = t.date || '';
  }
  const groups = Object.values(byName).sort((a, b) => b.latestDate.localeCompare(a.latestDate));
  document.getElementById('countLabel').textContent = groups.length + '大会';
  if (!groups.length) {
    document.getElementById('content').innerHTML = '<div class="empty">該当する大会がありません。</div>';
    return;
  }
  document.getElementById('content').innerHTML = groups.map(g => {
    const dateStr = g.latestDate ? fmtDate(g.latestDate) : '';
    const tids    = g.tournaments.map(t => t.id).join(',');
    const bodyId  = 'grp-' + nameHash(g.name);
    const delBtns = manageMode
      ? g.tournaments.map(t =>
          '<button class="del-btn" onclick="deleteTournament(\'' + esc(t.id) + '\',\'' + esc(t.name||t.id) + '\',event)" style="margin-left:4px;">🗑 '
          + esc(t.date || t.id) + '</button>'
        ).join('')
      : '';
    return '<div class="tournament-card' + (manageMode ? ' manage-mode' : '') + '" data-ids="' + esc(tids) + '">'
      + '<div class="tournament-header" onclick="toggleGroup(this)">'
      + (dateStr ? '<span class="t-date">' + esc(dateStr) + '</span>' : '')
      + '<span class="t-name">🏆 ' + esc(g.name) + '</span>'
      + '<span class="t-count">' + g.totalGames + '試合</span>'
      + delBtns
      + '<span class="t-arrow">▼</span>'
      + '</div>'
      + '<div class="tournament-body" id="' + bodyId + '">'
      + '<div class="loading" style="padding:20px;"><div class="sp" style="width:20px;height:20px;border-width:2px;"></div></div>'
      + '</div>'
      + '</div>';
  }).join('');
}

async function toggleGroup(header) {
  const card  = header.closest('.tournament-card');
  const body  = card.querySelector('.tournament-body');
  const arrow = header.querySelector('.t-arrow');
  const ids   = (card.dataset.ids || '').split(',').filter(Boolean);

  if (body.classList.contains('open')) {
    body.classList.remove('open'); arrow.textContent = '▼'; return;
  }
  body.classList.add('open'); arrow.textContent = '▲';

  // 未読み込みのtournamentを読み込む
  const unloaded = ids.filter(id => loadedGames[id] === undefined);
  if (unloaded.length) {
    body.innerHTML = '<div class="loading" style="padding:20px;"><div class="sp" style="width:20px;height:20px;border-width:2px;"></div></div>';
    for (const id of unloaded) {
      try {
        const data = await fetchJson('data/' + encodeURIComponent(id) + '.json');
        // _tid を付加してどの tournament ファイル由来かを記録
        loadedGames[id] = (data.games || []).map(g => ({ ...g, _tid: id }));
      } catch(e) {
        loadedGames[id] = [];
      }
    }
  }
  // グループ内の全試合を結合して表示
  const allGames = ids.flatMap(id => loadedGames[id] || []);
  renderGames(body, allGames);
}

function renderGames(body, games) {
  if (!games.length) {
    body.innerHTML = '<div class="empty" style="padding:20px;">試合データがありません。</div>';
    return;
  }
  const byRegion = {};
  for (const g of games) {
    const k = g.region || '不明';
    if (!byRegion[k]) byRegion[k] = [];
    byRegion[k].push(g);
  }
  body.innerHTML = Object.entries(byRegion).map(([region, gs]) => {
    const rows = gs.map(g => {
      const tid    = g._tid || '';
      const isEnd  = (g.game_status||'').includes('終了');
      // ヘッダー表示：tournament_name + extra_info（設定済みの場合）
      const tn = g.tournament_name || '';
      const ei = g.extra_info || '';
      const titleParts = [];
      if (tn) titleParts.push(tn);
      if (ei) titleParts.push(ei);
      // fallback
      if (!titleParts.length) {
        if (g.game_date_label) titleParts.push(g.game_date_label);
        if (g.venue) titleParts.push(g.venue);
        if (g.round) titleParts.push(g.round);
      }
      if (g.team1 && g.team2) titleParts.push(g.team1 + ' vs ' + g.team2);
      const titleStr = titleParts.join('　') || g.round || '試合';
      const scoreStr = (g.total1 !== '' && g.total2 !== '') ? g.total1 + '－' + g.total2 : '';

      const widgetUrl  = base + 'score_widget.html?id=' + encodeURIComponent(g.id) + '&tournament=' + encodeURIComponent(tid);
      const teamLabel  = (g.team1 && g.team2) ? g.team1 + ' vs ' + g.team2 : (g.round || '');
      const iframeCode = '<iframe src="' + widgetUrl + '" width="100%" height="175" style="border:none;border-radius:10px;display:block;" loading="lazy" title="' + teamLabel + ' スコア"></iframe>';

      const delBtn = manageMode
        ? '<button class="del-btn sm" onclick="deleteGame(\'' + esc(tid) + '\',\'' + esc(g.id) + '\',event)">削除</button>'
        : '';

      return '<div class="game-row">'
        + '<div class="game-summary" onclick="toggleGame(this)">'
        + '<span class="g-title">⚾ ' + esc(titleStr) + '</span>'
        + (isEnd ? '<span class="badge-end">終了</span>' : '')
        + (scoreStr ? '<span class="g-score">' + esc(scoreStr) + '</span>' : '')
        + delBtn
        + '<span class="g-arrow">▼</span>'
        + '</div>'
        + '<div class="embed-detail">'
        + '<label>iframeコード（他サイトのHTMLに貼り付けて使用）：</label>'
        + '<code>' + esc(iframeCode) + '</code>'
        + '<button class="copy-btn" onclick="copyCode(this)">📋 コードをコピー</button>'
        + '<div class="id-note">🔑 試合ID: <b>' + esc(g.id) + '</b>　大会ID: <b>' + esc(tid) + '</b></div>'
        + '</div>'
        + '</div>';
    }).join('');
    return '<div style="padding:8px 16px 4px;font-size:12px;font-weight:700;color:var(--text-dim);">🏟 ' + esc(region) + '</div>' + rows;
  }).join('');
}

function toggleGame(summary) {
  // 管理モード中は試合の展開・折りたたみをしない
  if (manageMode) return;
  const detail = summary.nextElementSibling;
  if (!detail) return;
  const arrow  = summary.querySelector('.g-arrow');
  const isOpen = detail.classList.contains('open');
  detail.classList.toggle('open');
  arrow.textContent = isOpen ? '▼' : '▲';
}

function copyCode(btn) {
  const code = btn.previousElementSibling;
  const text = code.textContent.trim();
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✔ コピーしました！'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 コードをコピー'; btn.classList.remove('copied'); }, 2000);
  }).catch(() => {
    const sel = window.getSelection(), range = document.createRange();
    range.selectNodeContents(code); sel.removeAllRanges(); sel.addRange(range);
  });
}

function applyFilter() {
  const q = document.getElementById('searchBox').value.trim().toLowerCase();
  if (!q) { lastFiltered = null; renderTournamentList(allTournaments); return; }
  // 大会名・ID・日付で絞り込み（グループ名でも一致する）
  lastFiltered = allTournaments.filter(t => {
    const text = [t.name, t.id, t.date].join(' ').toLowerCase();
    return text.includes(q);
  });
  renderTournamentList(lastFiltered);
}

init();
</script>
</body>
</html>
